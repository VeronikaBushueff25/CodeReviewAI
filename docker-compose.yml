version: '3.9'

services:
  # ── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: src/CodeReview.API/Dockerfile
    container_name: codereview_api
    ports:
      - "5000:8080"
      - "5001:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=codereview_db;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=redis:6379,abortConnect=false
      - Jwt__Secret=${JWT_SECRET:-CHANGE_ME_IN_DEV_MINIMUM_32_CHARACTERS_LONG}
      - Jwt__Issuer=CodeReviewAI
      - Jwt__Audience=CodeReviewAI.Client
      - GitHub__ClientId=${GITHUB_CLIENT_ID:-}
      - GitHub__ClientSecret=${GITHUB_CLIENT_SECRET:-}
      - AI__ApiKey=${HUGGINGFACE_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - codereview_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: codereview_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: codereview_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - codereview_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codereview_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: codereview_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - codereview_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── pgAdmin (optional dev tool) ────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: codereview_pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@codereview.ai
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres
    networks:
      - codereview_net
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:

networks:
  codereview_net:
    driver: bridge
